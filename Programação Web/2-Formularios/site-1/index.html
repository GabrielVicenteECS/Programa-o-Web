<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Elementos de Formulário</title>
</head>
<body>
    
    <h2>Estudando elementos de formulários</h2>
    
    <form action="get">
        <label for="nome">Primeiro nome:</label><br>
        <input type="text" name="nome"><br><br>
        <label for="sobrenome">Segundo nome:</label><br>
        <input type="text" name="sobrenome"><br><br>
        <input type="submit" value="Enviar!">
    </form>

    <h2>Input tipo Radio</h2>
    <form>
        <input type="radio" name="idade" value="16">
        <label for="16">16 anos.</label><br>
        <input type="radio" name="idade" value="17">
        <label for="17">17 anos.</label><br>
        <input type="radio" name="idade" value="18">
        <label for="18">18 anos.</label><br><br>
        <input type="submit" value="Enviar!">

    </form>

    <h2>Input do tipo Checkbox</h2>
    <form>
        <input type="checkbox" name="veículo" value="Bicicleta">
        <label for="veículo">Eu tenho uma bicicleta</label><br>
        <input type="checkbox" name="veículo" value="Moto">
        <label for="veículo">Eu tenho uma moto elétrica</label><br>
        <input type="checkbox" name="veículo" value="Carro">
        <label for="veículo">Eu tenho um carro elétrico</label><br>

    </form>

    <h2>Input de outros tipo</h2>
    <form>
        <input type="date" name="" id=""><br><br>
        <input type="color" name="" id=""><br><br>
        <input type="file" name="" id=""><br><br>
        <input type="password" name="" id=""><br><br>
        <input type="range" name="" id=""><br><br>
    </form>
</body>
</html>
